services:
  - type: web
    name: fsi-dds-frontend
    env: static
    plan: free
    region: singapore
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://fsi-dds-backend.onrender.com
      - key: VITE_APP_NAME
        value: FSI DDS
      - key: VITE_APP_VERSION
        value: 1.0.0
    routes:
      - type: rewrite
        source: /api/*
        destination: https://fsi-dds-backend.onrender.com/api/:splat
      - type: rewrite
        source: /*
        destination: /index.html